# ── insPRO — TAM YIĞIN ÜRETİM (tek sunucu) ─────────────────
# DB + API (FastAPI) + Web (Next.js) + Caddy (otomatik HTTPS).
#
# Kurulum:
#   cp .env.prod.example .env     # değerleri doldur (güçlü şifreler!)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# DNS (önce):
#   inspro.yazeproje.com       → A/AAAA → sunucu IP
#   api.inspro.yazeproje.com   → A/AAAA → sunucu IP

services:
  db:
    image: postgres:16-alpine
    container_name: inspro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inspro
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD gerekli}
      POSTGRES_DB: inspro
    volumes:
      - inspro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspro"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: inspro_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://inspro:${DB_PASSWORD:?gerekli}@db:5432/inspro
      JWT_SECRET: ${JWT_SECRET:?güçlü bir JWT_SECRET gerekli}
      CORS_ORIGINS: https://${FRONTEND_DOMAIN:?gerekli}
      UPLOAD_DIR: /data/yuklemeler
      YEREL_GIRIS_SIFRE: ""
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-İNŞPRO <yazeinspro@gmail.com>}
    volumes:
      - inspro_uploads:/data/yuklemeler

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:?gerekli}
    container_name: inspro_web
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: inspro_caddy
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:?gerekli}
      API_DOMAIN: ${API_DOMAIN:?gerekli}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  inspro_pgdata:
  inspro_uploads:
  caddy_data:
  caddy_config:
