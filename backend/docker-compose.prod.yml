# ── insPRO — ÜRETİM (sertleştirilmiş) ──────────────────────
# Yerel geliştirme için docker-compose.yml kullanın. Bu dosya yalnız
# sunucu/üretim içindir.
#
# Çalıştırma:
#   cp .env.prod.example .env        # değerleri doldurun (güçlü şifreler!)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Farklar (güvenlik):
#   • Adminer YOK (DB paneli internete açılmaz)
#   • DB host portu YOK (yalnız iç ağdan erişilir)
#   • API host portu YOK (yalnız Caddy reverse proxy üzerinden)
#   • Caddy ile otomatik HTTPS/TLS (Let's Encrypt)
#   • APP_ENV=production → zayıf JWT_SECRET / açık arka kapı / CORS=* ile başlamaz

services:
  db:
    image: postgres:16-alpine
    container_name: inspro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inspro
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD gerekli}
      POSTGRES_DB: inspro
    volumes:
      - inspro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspro"]
      interval: 5s
      timeout: 3s
      retries: 10
    # ports YOK — DB internete açık değil

  api:
    build: .
    container_name: inspro_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://inspro:${DB_PASSWORD:?gerekli}@db:5432/inspro
      JWT_SECRET: ${JWT_SECRET:?güçlü bir JWT_SECRET gerekli}
      CORS_ORIGINS: ${CORS_ORIGINS:?frontend alan adı gerekli}
      UPLOAD_DIR: /data/yuklemeler
      YEREL_GIRIS_SIFRE: ""
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-İNŞPRO <yazeinspro@gmail.com>}
    volumes:
      - inspro_uploads:/data/yuklemeler
    # ports YOK — yalnız Caddy üzerinden erişilir

  caddy:
    image: caddy:2-alpine
    container_name: inspro_caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?API alan adı gerekli (örn. api.inspro.com)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  inspro_pgdata:
  inspro_uploads:
  caddy_data:
  caddy_config:
