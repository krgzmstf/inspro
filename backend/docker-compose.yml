services:
  db:
    image: postgres:16-alpine
    container_name: inspro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inspro
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inspro_local}
      POSTGRES_DB: inspro
    ports:
      - "4432:5432"
    volumes:
      - inspro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspro"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: inspro_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://inspro:${DB_PASSWORD:-inspro_local}@db:5432/inspro
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-degistir-bu-gizli-anahtari}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      UPLOAD_DIR: /data/yuklemeler
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-İNŞPRO <yazeinspro@gmail.com>}
    ports:
      - "4400:4400"
    volumes:
      - inspro_uploads:/data/yuklemeler

volumes:
  inspro_pgdata:
  inspro_uploads:
